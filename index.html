<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🌱 Seed Quest</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0f1a;font-family:'Nunito',sans-serif}
canvas{display:block;position:fixed}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ====================================================
//  SEED QUEST v4 — 3-Lane Runner (Subway Surfers style)
//  Swipe LEFT/RIGHT = change lane
//  Swipe UP         = jump
//  Swipe DOWN       = slide
// ====================================================
const CV=document.getElementById('c');
const CTX=CV.getContext('2d');
const VW=450,VH=800;
let SCALE=1;
function resize(){
  SCALE=Math.min(innerWidth/VW,innerHeight/VH);
  CV.width=Math.round(VW*SCALE); CV.height=Math.round(VH*SCALE);
  CV.style.left=((innerWidth-CV.width)/2)+'px';
  CV.style.top=((innerHeight-CV.height)/2)+'px';
}
resize(); window.addEventListener('resize',resize);

// ── Audio ─────────────────────────────────────────────
let AC=null;
function ac(){return AC||(AC=new(window.AudioContext||window.webkitAudioContext)());}
function tone(f,d,t='sine',v=0.15,delay=0){
  try{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(v,a.currentTime+delay);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+delay+d);
    o.connect(g); g.connect(a.destination);
    o.start(a.currentTime+delay); o.stop(a.currentTime+delay+d);
  }catch(e){}
}
function sfx(t){
  switch(t){
    case 'swipe':   tone(440,.08,'square',.1); break;
    case 'jump':    tone(500,.1,'square',.12); tone(700,.08,'square',.08,.08); break;
    case 'slide':   tone(220,.15,'sine',.12); break;
    case 'land':    tone(180,.07,'sine',.1); break;
    case 'coin':    tone(880,.05,'sine',.12); tone(1100,.06,'sine',.1,.05); break;
    case 'hit':     tone(150,.3,'sawtooth',.3); break;
    case 'die':     tone(300,.1,'sawtooth',.2); tone(100,.4,'sawtooth',.2,.1); break;
    case 'lvlup':   [523,659,784,1047].forEach((f,i)=>tone(f,.18,'sine',.2,i*.1)); break;
    case 'shield':  tone(800,.1,'sine',.15); tone(1000,.1,'sine',.1,.08); break;
  }
}

// ── Constants ─────────────────────────────────────────
const LANES=[VW/2-130, VW/2, VW/2+130]; // x positions of 3 lanes
const GROUND_Y=620;
const PLAYER_Y=GROUND_Y-40;
const GRAV=0.7;
const J_VY=-14;
const SLIDE_DUR=45;
const LANE_SPEED=14; // px/frame for lane switch
const BASE_SPD=6;

const LEVELS=[
  {name:'Sprout',      color:'#69D36B',spd:1.0, iv:140, minT:25,coinT:14,diamT:1}, // 0
  {name:'Seedling',    color:'#FFF176',spd:1.12,iv:124, minT:28,coinT:16,diamT:1}, // 1
  {name:'Young Tree',  color:'#FFB74D',spd:1.24,iv:110, minT:30,coinT:18,diamT:2}, // 2
  {name:'Strong Tree', color:'#EF9A9A',spd:1.4, iv:96,  minT:32,coinT:20,diamT:2}, // 3
  {name:'Ancient Tree',color:'#CE93D8',spd:1.58,iv:84,  minT:34,coinT:22,diamT:2}, // 4
  {name:'Legendary',   color:'#FF80AB',spd:1.78,iv:74,  minT:36,coinT:24,diamT:3}, // 5
  {name:'King Kong',   color:'#A1887F',spd:1.98,iv:66,  minT:38,coinT:26,diamT:3}, // 6
  {name:'Sea Titan',   color:'#4FC3F7',spd:2.18,iv:60,  minT:40,coinT:28,diamT:3}, // 7
  {name:'Fairy Queen', color:'#F8BBD0',spd:2.4, iv:55,  minT:42,coinT:30,diamT:4}, // 8 — final
];
const LASTLVL=LEVELS.length-1; // 8

const SKINS=[
  {n:'🌱 Classic', c:'#66BB6A',d:'#2E7D32',sprout:true},
  {n:'☀️ Sunny',  c:'#FFD740',d:'#E65100',sprout:false},
  {n:'🍓 Berry',  c:'#EF5350',d:'#B71C1C',sprout:false},
  {n:'🦸 Hero',   c:'#42A5F5',d:'#0D47A1',sprout:false},
  {n:'🐼 Panda',  c:'#E0E0E0',d:'#212121',sprout:false},
  {n:'🐉 Dragon', c:'#CE93D8',d:'#4A148C',sprout:false},
  {n:'🚀 Astro',  c:'#90A4AE',d:'#263238',sprout:false},
  {n:'🌈 Rainbow',c:'#FF80AB',d:'#7B1FA2',sprout:true},
];

// ── Persistent State ──────────────────────────────────
let bestScore  =+localStorage.getItem('sq3_best') ||0;
let totalTok   =+localStorage.getItem('sq3_total')||0;
let curSkin    =+localStorage.getItem('sq3_skin') ||0;
let unlocked   =JSON.parse(localStorage.getItem('sq3_skins')||'[0]');
function save(){
  localStorage.setItem('sq3_best', bestScore);
  localStorage.setItem('sq3_total',totalTok);
  localStorage.setItem('sq3_skin', curSkin);
  localStorage.setItem('sq3_skins',JSON.stringify(unlocked));
}

// ── Game State ────────────────────────────────────────
let GS='HOME';
let elapsed=0,lvlIdx=0,lives=3,sessionTok=0;
let isFirst=true,canRevive=false,revived=false;
let frameN=0,lastSpawn=0;
let flashTimer=0,flashName='',shake=0;
let breathTimer=0;
let postPotholeGap=0;
let lastUfoTime=-30;     // ensures UFO available at 15s
let lastPotholeTime=0;
let lastAerialSpawn=0;
let obstacles=[],coins=[],particles=[],bgObjs=[];
let buttons=[];
let scrollZ=0;

// ── Level-gate progression (time + coin + diamond) ─────
let levelStartT=0;       // elapsed time when current level began
let lvlCoin=0,lvlDiam=0; // progress within current level (resets on level-up)
let sessionDiam=0;       // total diamonds this run

// ── Ad-revive cap (tiered by level) ────────────────────
let adsUsed=0;
function adCap(lvl){
  if(lvl<=2)return 5;   // Level 1-3
  if(lvl===3)return 8;  // Level 4
  return Infinity;      // Level 5-9
}

// ── Victory Lap (Level 9 gate met) ─────────────────────
let victoryActive=false,victoryTimer=0,victoryDone=false;

// ── Player ────────────────────────────────────────────
let P;
function mkPlayer(){
  return{
    lane:1,x:LANES[1],targetX:LANES[1],
    y:PLAYER_Y,vy:0,onGnd:true,dead:false,blink:0,animF:0,
    sqX:1,sqY:1,sliding:false,slideTimer:0,shieldOn:false,moving:false,
    flying:false,flyTimer:0,   // UFO power-up state
    dx:LANES[1],dy:PLAYER_Y,dvx:0,dvy:-10,dAngle:0,
  };
}

// ── Swipe Input ───────────────────────────────────────
// Logic:
// - touchmove  → handle lane change (horizontal) with 200ms cooldown per lane
// - touchend   → handle jump/slide (vertical only)
// → Both actions are fully independent — no interference

let tx0=0,ty0=0,tActive=false;
let tRefX=0;                  // điểm gốc để tính moved
let tLaneCooldown=0;          // timestamp of last lane change
const LANE_THR    = 38;       // px drag to trigger lane switch
const LANE_CD_MS  = 200;      // ms between lane switches (prevents skipping lanes)
const JUMP_MIN    = 22;       // px vuốt dọc tối thiểu để jump/slide

function getPos(e){
  const r=CV.getBoundingClientRect();
  // changedTouches must be checked FIRST — touchend has e.touches empty,
  // so e.touches[0] = undefined → NaN → all calculations break
  const s=(e.changedTouches&&e.changedTouches[0])
        ||(e.touches&&e.touches[0])
        ||e;
  return{x:(s.clientX-r.left)/SCALE,y:(s.clientY-r.top)/SCALE};
}

function onTD(e){
  e.preventDefault();
  const pos=getPos(e);
  tx0=pos.x; ty0=pos.y; tRefX=pos.x;
  tActive=true;
  for(const b of buttons){
    if(pos.x>=b.x&&pos.x<=b.x+b.w&&pos.y>=b.y&&pos.y<=b.y+b.h){b.fn();tActive=false;return;}
  }
  if(GS==='HOME'){startGame();tActive=false;return;}
}

function onTM(e){
  // Handle lane switching in real-time as finger drags horizontally
  e.preventDefault();
  if(!tActive||GS!=='PLAYING'||P.dead)return;
  const pos=getPos(e);
  const dx=pos.x-tRefX;
  const dyTotal=Math.abs(pos.y-ty0);

  // Ignore if swiping vertically (jump/slide)
  if(dyTotal>30&&dyTotal>Math.abs(pos.x-tx0))return;

  // Switch lane when threshold met AND cooldown elapsed
  const now=Date.now();
  if(now-tLaneCooldown<LANE_CD_MS)return;

  if(dx<-LANE_THR){
    goLane(-1);
    tRefX=pos.x;          // reset origin after each lane change
    tLaneCooldown=now;
  } else if(dx>LANE_THR){
    goLane(+1);
    tRefX=pos.x;
    tLaneCooldown=now;
  }
}

function onTU(e){
  // Handle jump/slide on finger lift
  e.preventDefault();
  if(!tActive)return; tActive=false;
  if(GS!=='PLAYING'||P.dead)return;
  const pos=getPos(e);
  const ddx=Math.abs(pos.x-tx0);
  const ddy=ty0-pos.y;   // dương = vuốt lên

  // Jump khi vuốt lên đủ xa và không quá nghiêng ngang
  if(Math.abs(ddy)<JUMP_MIN)return;
  if(ddx>Math.abs(ddy)*1.8)return; // cho phép lệch ngang đến 80%

  if(ddy>0){
    if(P.onGnd&&!P.sliding){doJump();sfx('jump');}
  } else {
    if(P.onGnd&&!P.sliding){doSlide();}
  }
}

function goLane(dir){
  const newL=Math.max(0,Math.min(2,P.lane+dir));
  if(newL===P.lane)return;
  P.lane=newL; P.targetX=LANES[newL];
  P.moving=true; sfx('swipe');
}
function doJump(){
  P.vy=J_VY; P.onGnd=false; P.sliding=false; P.slideTimer=0;
  P.sqX=0.75; P.sqY=1.35;
  addPart(P.x,GROUND_Y,8,['#A5D6A7','#C8E6C9','#fff'],false);
}
function doSlide(){
  P.sliding=true; P.slideTimer=SLIDE_DUR;
  sfx('slide');
  addPart(P.x,GROUND_Y,8,['#A5D6A7','#D7CCC8','#795548'],false);
}

CV.addEventListener('touchstart', onTD,{passive:false});
CV.addEventListener('touchmove',  onTM,{passive:false}); // real-time lane switching
CV.addEventListener('touchend',   onTU,{passive:false});
CV.addEventListener('mousedown',  onTD);
CV.addEventListener('mousemove',  e=>{if(e.buttons===1)onTM(e);}); // mouse drag
CV.addEventListener('mouseup',   onTU);

document.addEventListener('keydown',e=>{
  if(GS!=='PLAYING'||P.dead)return;
  if(e.key==='ArrowLeft')  {e.preventDefault();goLane(-1);}
  if(e.key==='ArrowRight') {e.preventDefault();goLane(+1);}
  if(e.key==='ArrowUp'||e.key===' '){e.preventDefault();if(P.onGnd&&!P.sliding){doJump();sfx('jump');}}
  if(e.key==='ArrowDown')  {e.preventDefault();if(P.onGnd&&!P.sliding)doSlide();}
  if(e.key==='Enter'&&GS==='HOME')startGame();
});

// ── Helpers ───────────────────────────────────────────
function addPart(x,y,n,cols,explode){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=2+Math.random()*4;
    particles.push({
      x,y,vx:Math.cos(a)*sp,
      vy:explode?Math.sin(a)*sp:(-sp*.7-Math.random()*2),
      r:3+Math.random()*4,
      col:cols[Math.floor(Math.random()*cols.length)],
      life:28+Math.floor(Math.random()*22),ml:50,
    });
  }
}
function rrect(c,x,y,w,h,r,fill,stroke){
  c.beginPath();
  if(c.roundRect){c.roundRect(x,y,w,h,r);}
  else{
    c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);
    c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);
    c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);
    c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();
  }
  if(fill){c.fillStyle=fill;c.fill();}
  if(stroke){c.strokeStyle=stroke;c.lineWidth=1.5;c.stroke();}
}
function curSpd(){
  if(victoryActive)return LEVELS[0].spd*BASE_SPD; // chill speed during victory lap
  const base=LEVELS[Math.min(lvlIdx,LASTLVL)].spd;
  const lateBonus=elapsed>180?Math.floor((elapsed-180)/60)*0.15:0;
  if(lvlIdx>=LASTLVL){
    const endBonus=victoryDone?Math.max(0,Math.floor((elapsed-levelStartT-50)/60))*.08:0;
    return(base+endBonus+lateBonus)*BASE_SPD;
  }
  return(base+lateBonus)*BASE_SPD;
}
function spawnIv(){
  const base=Math.max(64,LEVELS[Math.min(lvlIdx,LASTLVL)].iv-frameN*.005);
  if(breathTimer>0)return Math.max(base,110); // sparse but not empty during breathing
  return base;
}

// ── Game Functions ────────────────────────────────────
function startGame(){
  GS='PLAYING';
  elapsed=0;frameN=0;lvlIdx=0;scrollZ=0;
  flashTimer=0;shake=0;lastSpawn=0;
  breathTimer=0;postPotholeGap=0;
  lastUfoTime=-30;lastPotholeTime=0;lastAerialSpawn=0;
  levelStartT=0;lvlCoin=0;lvlDiam=0;sessionDiam=0;
  adsUsed=0;victoryActive=false;victoryTimer=0;victoryDone=false;
  lives=3; sessionTok=0;
  obstacles=[];coins=[];particles=[];bgObjs=[];
  revived=false;canRevive=false;
  P=mkPlayer(); buttons=[];
  initBG();
}

function initBG(){
  // Floating background objects (trees, clouds at sides)
  for(let i=0;i<12;i++){
    bgObjs.push({
      type:i<6?'tree':'cloud',
      side:Math.random()<.5?-1:1,
      z:Math.random()*800,
      y:Math.random()*0.4+0.3,
      size:20+Math.random()*40,
    });
  }
}

function spawnRow(){
  const spd=curSpd();
  const z=820+Math.random()*160;

  // Victory lap: no obstacles, just celebratory coins
  if(victoryActive){ if(Math.random()<0.6)spawnCoins(z); return; }

  // Grace period: 0–5s empty road
  if(elapsed<5)return;

  // Guaranteed pothole every 15s — clearing it rewards a diamond
  if(elapsed-lastPotholeTime>=15){
    lastPotholeTime=elapsed;
    const pl=Math.floor(Math.random()*3);
    obstacles.push(mkObs(pl,z,'pothole',spd));
    coins.push({lane:pl,z:z-95,r:14,got:false,bouncePh:0,type:'diamond'});
    postPotholeGap=Math.floor(spawnIv()*2.0);
    spawnCoins(z);return;
  }
  if(postPotholeGap>0){ spawnCoins(z);return; } // fill gap with coins, never empty

  // Guaranteed UFO every 30s (from 15s onward)
  if(elapsed>=15&&!P.flying&&elapsed-lastUfoTime>=30){
    lastUfoTime=elapsed;
    coins.push({lane:Math.floor(Math.random()*3),z,r:18,got:false,bouncePh:0,type:'ufo'});
  }

  // Breathing room after level-up: sparse but never empty
  if(breathTimer>0){
    obstacles.push(mkObs(Math.floor(Math.random()*3),z,'rock',spd));
    spawnCoins(z);return;
  }

  // Normal pattern selection
  const earlyGame=elapsed<22;
  const nearbyCount=obstacles.filter(o=>!o.aerial&&o.z<500).length;
  const safe=nearbyCount===0;
  const patterns=['single','single','wall_slide','stagger','double','wall_jump','zigzag'];
  const maxPat=earlyGame?3:safe?4+Math.floor(lvlIdx):4;
  const pat=patterns[Math.floor(Math.random()*Math.min(maxPat,patterns.length))];

  if(pat==='stagger'&&safe)      spawnStagger(z,spd);
  else if(pat==='double'&&safe){ const sk=Math.floor(Math.random()*3);for(let l=0;l<3;l++)if(l!==sk)obstacles.push(mkObs(l,z,pickObsType(),spd));}
  else if(pat==='wall_jump'&&safe){const fr=Math.floor(Math.random()*3);for(let l=0;l<3;l++)if(l!==fr)obstacles.push(mkObs(l,z,'low',spd));}
  else if(pat==='wall_slide')    obstacles.push(mkObs(Math.floor(Math.random()*3),z,'tall',spd));
  else if(pat==='zigzag'&&safe){ const l1=Math.floor(Math.random()*3),l2=(l1+1+Math.floor(Math.random()*2))%3;
    obstacles.push(mkObs(l1,z,pickObsType(),spd));obstacles.push(mkObs(l2,z+560,pickObsType(),spd));}
  else                           obstacles.push(mkObs(Math.floor(Math.random()*3),z,pickObsType(),spd));

  spawnCoins(z);
}

function spawnStagger(z,spd){
  // 3 obstacles in 3 different lanes, staggered — always dodgeable by lane switching
  const lanes=[0,1,2].sort(()=>Math.random()-.5);
  obstacles.push(mkObs(lanes[0],z,         pickObsType(),spd));
  obstacles.push(mkObs(lanes[1],z+310,     pickObsType(),spd));
  obstacles.push(mkObs(lanes[2],z+620,     pickObsType(),spd));
  // Diamond reward: placed in the lane whose obstacle is farthest away —
  // reachable only if the player has already lane-switched correctly
  coins.push({lane:lanes[2],z:z+150,r:14,got:false,bouncePh:0,type:'diamond'});
}
function spawnCoins(z){
  const freeLane=Math.floor(Math.random()*3);
  for(let i=0;i<4;i++)
    coins.push({lane:freeLane,z:z-50-i*55,r:13,got:false,bouncePh:i*.5,type:'coin'});
}

function pickObsType(){
  const pool=['rock','rock','thorn','low','bug'];
  if(lvlIdx>=2)pool.push('bug','thorn');
  if(lvlIdx>=3)pool.push('tall','rock');
  if(lvlIdx>=5)pool.push('bug','tall');
  if(lvlIdx>=7)pool.push('thorn','low');
  return pool[Math.floor(Math.random()*pool.length)];
}

function mkObs(lane,z,type,spd){
  const t=type==='single_easy'?'rock':type; // single_easy = simple rock
  return{lane,z,type:t,spd,active:true,aerial:false,
    w:t==='pothole'?115:t==='tall'?60:t==='bug'?64:52,
    h:t==='pothole'?14:t==='tall'?72:t==='low'?22:t==='bug'?36:38,
    flyOff:Math.random()*Math.PI*2,
  };
}

function playerDie(){
  if(P.dead||P.blink>0)return;
  if(P.shieldOn){P.shieldOn=false;sfx('shield');addPart(P.x,P.y,14,['#FFD740','#64B5F6'],true);return;}
  sfx('die');shake=20;P.dead=true;
  P.dx=P.x;P.dy=P.y;P.dvx=(Math.random()-.5)*4;P.dvy=-11;P.dAngle=0;
  addPart(P.x,P.y,20,['#EF5350','#FFCDD2','#FF8A65'],true);
  lives--;
  setTimeout(()=>{
    if(lives<=0){
      canRevive=adsUsed<adCap(lvlIdx); // tiered ad-revive cap by level reached
      if(Math.floor(elapsed)>bestScore){bestScore=Math.floor(elapsed);save();}
      totalTok+=sessionTok;save();
      shake=0;GS='GAMEOVER';buildGOBtns();
    }else respawn();
  },1400);
}

function respawn(){
  const oldLane=P.lane;
  P=mkPlayer();
  P.lane=oldLane;P.x=LANES[oldLane];P.targetX=LANES[oldLane];
  P.blink=210;
  GS='PLAYING';
}

function doRevive(){
  adsUsed++;
  // First run already had 3 lives; every ad-revive gives 2 lives
  lives=2;
  P=mkPlayer();P.blink=240;
  obstacles=obstacles.filter(o=>o.z>100);
  sfx('lvlup');GS='PLAYING';isFirst=false;buttons=[];
}
function goHome(){totalTok+=sessionTok;save();isFirst=false;GS='HOME';buttons=[];shake=0;}

function buildGOBtns(){
  buttons=[];
  const bx=85;
  if(canRevive)buttons.push({x:bx,y:492,w:VW-bx*2,h:62,label:'📺  Watch Ad to Continue',style:'green',fn:doRevive});
  buttons.push({x:bx,y:canRevive?574:510,w:VW-bx*2,h:54,label:'🏠  Back to Home',style:'ghost',fn:goHome});
}

function cycleSkin(){
  const i=unlocked.indexOf(curSkin);
  curSkin=unlocked[(i+1)%unlocked.length];save();
}

function checkUnlocks(){
  [[1,lvlIdx>=1],[3,lvlIdx>=2],[5,lvlIdx>=3],[6,lvlIdx>=4]].forEach(([id,c])=>{
    if(c&&!unlocked.includes(id)){unlocked.push(id);save();}
  });
}

// ── Update ────────────────────────────────────────────
function update(dt){
  if(GS!=='PLAYING')return;
  if(P.dead){
    P.dx+=P.dvx;P.dy+=P.dvy;P.dvy+=GRAV*.9;P.dAngle+=.2;
    return;
  }

  const spd=curSpd();
  elapsed+=dt;frameN++;
  scrollZ+=spd;

  // ── Level-up gate: time + coin + diamond ──
  if(!victoryActive&&lvlIdx<LASTLVL){
    const lv=LEVELS[lvlIdx];
    if(elapsed-levelStartT>=lv.minT&&lvlCoin>=lv.coinT&&lvlDiam>=lv.diamT){
      lvlIdx++;levelStartT=elapsed;lvlCoin=0;lvlDiam=0;
      flashTimer=130;flashName=LEVELS[lvlIdx].name;
      sfx('lvlup');checkUnlocks();
      breathTimer=180;
      bgObjs=[];initBG(); // fresh BG objects for new level theme
      addPart(VW/2,VH/2,30,['#FF4081','#7C4DFF','#00BCD4','#FFD600'],true);
    }
  } else if(!victoryActive&&lvlIdx===LASTLVL&&!victoryDone){
    const lv=LEVELS[LASTLVL];
    if(elapsed-levelStartT>=lv.minT&&lvlCoin>=lv.coinT&&lvlDiam>=lv.diamT){
      victoryActive=true;victoryTimer=12*60; // 12s victory lap
      obstacles=[];
      sfx('lvlup');flashTimer=170;flashName='🏆 CHAMPION! 🏆';
      addPart(VW/2,VH/2,50,['#FFD600','#FF4081','#7C4DFF','#fff','#F8BBD0'],true);
    }
  }
  if(victoryActive){
    victoryTimer--;
    if(victoryTimer<=0){victoryActive=false;victoryDone=true;levelStartT=elapsed;lvlCoin=0;lvlDiam=0;}
  }

  // Token
  const p2=Math.floor(elapsed-dt),c2=Math.floor(elapsed);
  if(c2>p2&&c2%10===0)sessionTok++;

  // Lane transition
  if(P.moving){
    const dx=P.targetX-P.x;
    if(Math.abs(dx)<2){P.x=P.targetX;P.moving=false;}
    else P.x+=dx*.32;
  }

  // Slide
  if(P.sliding){P.slideTimer--;if(P.slideTimer<=0){P.sliding=false;}}

  // Flying power-up physics
  if(P.flying){
    P.flyTimer--;
    P.y+=(PLAYER_Y-185-P.y)*.12; // smooth rise to fly height
    P.onGnd=false; P.vy=0;
    if(P.flyTimer<=0){P.flying=false;} // gravity takes over on next frame
  } else {
    if(!P.onGnd){P.vy+=GRAV;P.y+=P.vy;}
    if(P.y>=PLAYER_Y){
      if(!P.onGnd){P.sqX=1.3;P.sqY=0.7;sfx('land');addPart(P.x,GROUND_Y,5,['#A5D6A7','#fff'],false);}
      P.y=PLAYER_Y;P.vy=0;P.onGnd=true;
    }else P.onGnd=false;
  }
  P.animF++;
  P.sqX+=(1-P.sqX)*.2;P.sqY+=(1-P.sqY)*.2;

  if(P.blink>0)P.blink--;
  if(shake>0)shake--;
  if(flashTimer>0)flashTimer--;
  if(breathTimer>0)breathTimer--;
  if(postPotholeGap>0)postPotholeGap--;

  // Aerial obstacle spawn when flying (staggered, ~1.5s apart)
  if(P.flying&&P.flyTimer>60&&frameN-lastAerialSpawn>=80){
    lastAerialSpawn=frameN;
    const types=['dove','dove','butterfly','bee'];
    const t=types[Math.floor(Math.random()*types.length)];
    const al=Math.floor(Math.random()*3);
    obstacles.push({lane:al,z:820+Math.random()*100,type:t,
      aerial:true,active:true,w:58,h:32,flyOff:Math.random()*Math.PI*2,spd:curSpd()*.88});
  }

  // Move obstacles / coins toward player
  for(const o of obstacles)o.z-=spd;
  obstacles=obstacles.filter(o=>o.z>-60);

  for(const c of coins){c.z-=spd;c.bouncePh+=.1;}
  coins=coins.filter(c=>c.z>-60);

  // BG parallax
  for(const b of bgObjs){
    b.z-=spd*.4;
    if(b.z<-50)b.z=820+Math.random()*200;
  }

  // Particles
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life--;}
  particles=particles.filter(p=>p.life>0);

  // Spawn
  if(frameN-lastSpawn>=spawnIv()){spawnRow();lastSpawn=frameN;}

  // Collision
  if(!P.dead&&P.blink===0){
    const pr=P.sliding?14:19;
    const py=P.sliding?PLAYER_Y+10:P.y;

    for(const o of obstacles){
      if(!o.active)continue;
      if(o.z>55||o.z<-20)continue;
      if(o.lane!==P.lane)continue;
      if(o.aerial&&!P.flying)continue;  // aerial obs, player on ground → safe
      if(!o.aerial&&P.flying)continue;  // ground obs, player flying → safe
      if(o.aerial){playerDie();return;}  // aerial hit → always dies
      // Ground obstacle logic
      if(o.type==='tall'&&P.sliding)continue;               // slide under tall
      if((o.type==='low'||o.type==='pothole')&&P.y<PLAYER_Y-22)continue; // jump over low/pothole
      if(Math.abs(py-PLAYER_Y)<pr+o.h/2){playerDie();return;}
    }

    // Coins + Diamonds + UFO pickup
    for(const c of coins){
      if(c.got)continue;
      if(c.lane!==P.lane)continue;
      if(c.z>60||c.z<-30)continue;
      c.got=true;
      if(c.type==='ufo'&&!P.flying){
        P.flying=true;P.flyTimer=15*60; // 15 seconds flight
        sfx('lvlup');
        addPart(P.x,P.y,16,['#64B5F6','#90CAF9','#CE93D8','#fff'],true);
      } else if(c.type==='diamond'){
        lvlDiam++;sessionDiam++;sfx('lvlup');
        addPart(LANES[c.lane],GROUND_Y-50,10,['#80DEEA','#E0F7FA','#fff','#4DD0E1'],true);
      } else if(c.type==='coin'){
        sessionTok++;lvlCoin++;sfx('coin');
        addPart(LANES[c.lane],GROUND_Y-50,6,['#FFD740','#FFEC80','#FFF9C4'],true);
      }
    }
  }
}

// ── Perspective Projection ────────────────────────────
// Map world z (0=near player, 800=horizon) to screen
function proj(worldX,worldZ,worldY=0){
  const horizon=140;     // horizon Y — raised to show more road
  const camZ=0;
  const fov=320;
  const z=Math.max(1,worldZ);
  const scale=fov/(fov+z);
  const sx=VW/2+(worldX-VW/2)*scale;
  const sy=horizon+(GROUND_Y-horizon)*scale - worldY*scale;
  return{sx,sy,scale};
}

// ── Draw ──────────────────────────────────────────────
function draw(){
  const c=CTX;
  c.save();c.scale(SCALE,SCALE);
  if(GS!=='HOME'&&shake>0){c.translate((Math.random()-.5)*shake*.35,(Math.random()-.5)*shake*.35);}
  if(GS==='HOME')         drawHome(c);
  else if(GS==='PLAYING') drawPlay(c);
  else{drawPlay(c);drawGameOver(c);}
  c.restore();
}

// ── Play ──────────────────────────────────────────────
function drawPlay(c){
  const lvl=LEVELS[Math.min(lvlIdx,LASTLVL)];

  // ── Per-level sky ──
  const skyThemes=[
    ['#87CEEB','#C8F0A0'],  // 0 Garden
    ['#FFAB40','#FF6F00'],  // 1 Hills
    ['#111118','#1a1a2e'],  // 2 Tunnel
    ['#87CEEB','#B3E5FC'],  // 3 Bridge
    ['#FF7043','#880E4F'],  // 4 Autumn
    ['#607D8B','#37474F'],  // 5 Railway
    ['#1A2340','#0D1326'],  // 6 King Kong — city night
    ['#4FC3F7','#0288D1'],  // 7 Sea Titan — calm bright sea
    ['#F8BBD0','#CE93D8'],  // 8 Fairy Queen — fantasy blossom
  ];
  const sk=skyThemes[Math.min(lvlIdx,LASTLVL)];
  const sg=c.createLinearGradient(0,0,0,140);
  sg.addColorStop(0,sk[0]);sg.addColorStop(1,sk[1]);
  c.fillStyle=sg;c.fillRect(0,0,VW,140);

  // Autumn: falling leaves in sky
  if(lvlIdx===4){
    const lc=['#FF5722','#FF9800','#FFC107','#E53935'];
    for(let i=0;i<18;i++){
      const lx=((i*137+frameN*.9+i*31)%VW+VW)%VW;
      const ly=((i*83+frameN*(0.6+i*.025))%140+140)%140;
      c.save();c.translate(lx,ly);c.rotate(i+frameN*.025);
      c.fillStyle=lc[i%4];c.globalAlpha=.65;
      c.beginPath();c.ellipse(0,0,4,7,0,0,Math.PI*2);c.fill();
      c.restore();c.globalAlpha=1;
    }
  }
  // King Kong: night stars + big moon
  if(lvlIdx===6){
    c.fillStyle='rgba(255,253,231,.9)';
    c.beginPath();c.arc(VW-70,42,26,0,Math.PI*2);c.fill();
    c.fillStyle='rgba(255,253,231,.25)';
    c.beginPath();c.arc(VW-70,42,38,0,Math.PI*2);c.fill();
    for(let i=0;i<30;i++){
      const sx2=((i*113+scrollZ*.015)%VW+VW)%VW;
      const sy2=8+((i*71)%110);
      c.globalAlpha=.4+Math.sin(i*3+frameN*.08)*.35;
      c.fillStyle='white';c.beginPath();c.arc(sx2,sy2,1+Math.sin(i)*.6,0,Math.PI*2);c.fill();
    }
    c.globalAlpha=1;
  }
  // Fairy Queen: falling petals + sparkle dust
  if(lvlIdx===8){
    const pc=['#F8BBD0','#F48FB1','#FFFFFF','#E1BEE7'];
    for(let i=0;i<20;i++){
      const lx=((i*149+frameN*.7+i*23)%VW+VW)%VW;
      const ly=((i*61+frameN*(0.5+i*.02))%140+140)%140;
      c.save();c.translate(lx,ly);c.rotate(i*.7+frameN*.02);
      c.fillStyle=pc[i%4];c.globalAlpha=.7;
      c.beginPath();c.ellipse(0,0,3.5,6,0,0,Math.PI*2);c.fill();
      c.restore();c.globalAlpha=1;
    }
    for(let i=0;i<14;i++){
      const sx2=((i*97+scrollZ*.02)%VW+VW)%VW;
      const sy2=10+((i*53)%120);
      c.globalAlpha=.5+Math.sin(i*4+frameN*.1)*.4;
      c.fillStyle='#fff';c.beginPath();c.arc(sx2,sy2,1.2,0,Math.PI*2);c.fill();
    }
    c.globalAlpha=1;
  }

  // ── Per-level BG objects ──
  for(const b of bgObjs){
    const bx=b.side<0?72:VW-72;
    const {sx,sy,scale}=proj(bx,b.z,0);
    if(scale<0.05||scale>0.98)continue;
    const h=b.size*scale;
    c.globalAlpha=Math.min(1,scale*1.2)*.82;

    switch(Math.min(lvlIdx,LASTLVL)){
      case 0:{ // Garden — green round trees
        c.fillStyle='#5D4037';c.fillRect(sx-h*.08,sy-h*.45,h*.16,h*.45);
        const tg=c.createRadialGradient(sx-h*.1,sy-h*.6,1,sx,sy-h*.55,h*.5);
        tg.addColorStop(0,'#66BB6A');tg.addColorStop(1,'#2E7D32');
        c.fillStyle=tg;c.beginPath();c.arc(sx,sy-h*.58,h*.46,0,Math.PI*2);c.fill();
        break;}
      case 1:{ // Hills — trees with flowers + rolling hill
        c.fillStyle='rgba(56,142,60,0.45)';
        c.beginPath();c.moveTo(sx-85*scale,sy);c.quadraticCurveTo(sx,sy-65*scale,sx+85*scale,sy);c.closePath();c.fill();
        c.fillStyle='#4E342E';c.fillRect(sx-h*.07,sy-h*.48,h*.14,h*.48);
        c.fillStyle='#1B5E20';c.beginPath();c.arc(sx,sy-h*.52,h*.4,0,Math.PI*2);c.fill();
        const fc=['#F48FB1','#FF80AB','#FFFFFF','#FFE082'];
        for(let fi=0;fi<5;fi++){const fa=fi/5*Math.PI*2;c.fillStyle=fc[fi%4];c.beginPath();c.arc(sx+Math.cos(fa)*h*.38,sy-h*.52+Math.sin(fa)*h*.3,h*.1,0,Math.PI*2);c.fill();}
        break;}
      case 2:{ // Tunnel — concrete walls only, fully dark, no lights
        c.fillStyle='#424242';
        c.fillRect(b.side<0?sx-h*.25:sx-h*.15,sy-h*1.4,h*.38,h*1.4);
        c.fillStyle='#616161';
        c.fillRect(b.side<0?sx-h*.28:sx-h*.18,sy-h*.55,h*.44,h*.08);
        c.fillRect(b.side<0?sx-h*.28:sx-h*.18,sy-h*.25,h*.44,h*.08);
        break;}
      case 3:{ // Bridge — railings + water + boats
        c.fillStyle='#90A4AE';c.fillRect(sx-h*.06,sy-h*.85,h*.12,h*.85);
        c.fillStyle='#78909C';
        c.fillRect(b.side<0?sx-h*.05:sx-h*.35,sy-h*.65,h*.4,h*.055);
        c.fillRect(b.side<0?sx-h*.05:sx-h*.35,sy-h*.35,h*.4,h*.055);
        if(scale<0.42){
          const wg=c.createLinearGradient(0,sy,0,sy+38*scale);
          wg.addColorStop(0,'#1565C0');wg.addColorStop(1,'#0D47A1');
          c.fillStyle=wg;c.fillRect(sx-28*scale,sy,56*scale,32*scale);
          if(Math.floor(b.z/160)%3===0){
            c.fillStyle='#BF360C';
            c.beginPath();c.moveTo(sx-9*scale,sy+14*scale);c.lineTo(sx+9*scale,sy+14*scale);c.lineTo(sx+7*scale,sy+22*scale);c.lineTo(sx-7*scale,sy+22*scale);c.closePath();c.fill();
            c.fillStyle='#E65100';c.fillRect(sx-1.5*scale,sy+6*scale,3*scale,10*scale);
          }
        }
        break;}
      case 4:{ // Autumn — multi-colour trees + falling leaves
        c.fillStyle='#4E342E';c.fillRect(sx-h*.07,sy-h*.45,h*.14,h*.45);
        const ac=['#E53935','#FF9800','#FFC107','#E64A19'];
        for(let ai=0;ai<4;ai++){
          const ax=sx+(ai-1.5)*h*.21,ay=sy-h*.52+(ai%2)*h*.14;
          c.fillStyle=ac[ai];c.globalAlpha=Math.min(1,scale*1.2)*.78;
          c.beginPath();c.arc(ax,ay,h*.3,0,Math.PI*2);c.fill();
        }
        const leafX=sx+Math.sin(frameN*.06+b.z)*18*scale;
        const leafY=sy-h*.3-((frameN*1.1+b.z*.5)%110)*scale;
        c.fillStyle=ac[Math.floor(frameN*.12+b.z)%4];
        c.beginPath();c.ellipse(leafX,leafY,4*scale,6*scale,frameN*.1,0,Math.PI*2);c.fill();
        break;}
      case 5:{ // Railway — telegraph poles + signal lights + rail track
        c.fillStyle='#5D4037';c.fillRect(sx-h*.05,sy-h*1.05,h*.1,h*1.05);
        c.fillRect(sx-h*.28,sy-h*.95,h*.56,h*.05);
        const sigOn=Math.floor(elapsed*2+b.side)%4<2;
        c.fillStyle=sigOn?'#F44336':'#4CAF50';
        c.beginPath();c.arc(sx+(b.side<0?h*.14:-h*.14),sy-h*.9,h*.12,0,Math.PI*2);c.fill();
        c.fillStyle=sigOn?'rgba(244,67,54,.3)':'rgba(76,175,80,.3)';
        c.beginPath();c.arc(sx+(b.side<0?h*.14:-h*.14),sy-h*.9,h*.22,0,Math.PI*2);c.fill();
        c.fillStyle='#78909C';c.fillRect(b.side<0?sx-h*.18:sx+h*.06,sy-h*.04,h*.12,h*.04);
        break;}
      case 6:{ // King Kong — city skyscrapers, lit windows
        c.fillStyle='#1C2333';
        c.fillRect(sx-h*.22,sy-h*1.5,h*.44,h*1.5);
        c.fillStyle='rgba(255,213,79,.85)';
        for(let wy=0;wy<6;wy++)for(let wx=0;wx<2;wx++){
          if((wy+wx+Math.floor(b.z/90))%3===0)
            c.fillRect(sx-h*.16+wx*h*.18,sy-h*1.4+wy*h*.22,h*.08,h*.1);
        }
        // Antenna light
        c.fillStyle='#EF5350';c.beginPath();c.arc(sx,sy-h*1.52,h*.04,0,Math.PI*2);c.fill();
        break;}
      case 7:{ // Sea Titan — calm water, small waves, distant fin
        const wg2=c.createLinearGradient(0,sy-h*.1,0,sy+h*.3);
        wg2.addColorStop(0,'#4FC3F7');wg2.addColorStop(1,'#0288D1');
        c.fillStyle=wg2;c.fillRect(sx-h*.6,sy-h*.06,h*1.2,h*.3);
        c.strokeStyle='rgba(255,255,255,.5)';c.lineWidth=1.2*scale;
        for(let wi=0;wi<2;wi++){
          c.beginPath();
          for(let wx=-h*.55;wx<h*.55;wx+=6*scale)c.lineTo(sx+wx,sy+wi*h*.12+Math.sin((wx+frameN*2)*.08)*2);
          c.stroke();
        }
        if(Math.floor(b.z/200)%2===0){
          c.fillStyle='#37474F';
          c.beginPath();c.moveTo(sx-h*.06,sy-h*.04);c.quadraticCurveTo(sx,sy-h*.22,sx+h*.05,sy-h*.04);c.closePath();c.fill();
        }
        break;}
      case 8:{ // Fairy Queen — blossom trees, glowing orbs
        c.fillStyle='#A1887F';c.fillRect(sx-h*.06,sy-h*.42,h*.12,h*.42);
        const blc=['#F8BBD0','#F48FB1','#FFFFFF','#E1BEE7'];
        for(let bi=0;bi<4;bi++){
          c.fillStyle=blc[bi];c.globalAlpha=Math.min(1,scale*1.2)*.8;
          c.beginPath();c.arc(sx+(bi-1.5)*h*.18,sy-h*.5+(bi%2)*h*.12,h*.27,0,Math.PI*2);c.fill();
        }
        c.globalAlpha=Math.min(1,scale*1.2)*.82;
        const og=c.createRadialGradient(sx,sy-h*.65,1,sx,sy-h*.65,h*.2);
        og.addColorStop(0,'rgba(255,255,255,.9)');og.addColorStop(1,'rgba(244,143,177,0)');
        c.fillStyle=og;c.beginPath();c.arc(sx,sy-h*.65,h*.2,0,Math.PI*2);c.fill();
        break;}
    }
    c.globalAlpha=1;
  }

  // Road
  drawRoad(c,scrollZ);

  // Bridge: river surface visible below horizon
  if(lvlIdx===3){
    const rg=c.createLinearGradient(0,140,0,175);
    rg.addColorStop(0,'#1565C0');rg.addColorStop(1,'#0D47A1');
    c.fillStyle=rg;c.fillRect(0,140,VW,35);
    // Wave lines
    c.strokeStyle='rgba(100,181,246,0.35)';c.lineWidth=1.5;
    for(let wi=0;wi<4;wi++){
      const wy=148+wi*6;
      c.beginPath();
      for(let wx=0;wx<VW;wx+=8){c.lineTo(wx,wy+Math.sin((wx+frameN*2+wi*30)*.06)*3);}
      c.stroke();
    }
  }

  // Coins + UFO items (sorted by z desc)
  const sortedCoins=[...coins].sort((a,b)=>b.z-a.z);
  for(const coin of sortedCoins){
    if(coin.got)continue;
    const lx=LANES[coin.lane];
    const by=Math.sin(coin.bouncePh)*6;
    const {sx,sy,scale}=proj(lx,coin.z,40+by);
    if(scale<0.08||scale>0.98)continue;
    if(coin.type==='ufo'){
      // UFO saucer
      const ur=22*scale;
      const ug=c.createRadialGradient(sx-ur*.3,sy-ur*.3,1,sx,sy,ur*1.2);
      ug.addColorStop(0,'#B3E5FC');ug.addColorStop(1,'#0288D1');
      c.save();c.translate(sx,sy);c.scale(1,.45);
      c.beginPath();c.arc(0,0,ur,0,Math.PI*2);c.fillStyle=ug;c.fill();
      c.restore();
      c.fillStyle='rgba(3,169,244,0.6)';
      c.beginPath();c.arc(sx,sy-ur*.3*scale,ur*.55,0,Math.PI*2);c.fill();
      c.fillStyle='#fff';c.font=`bold ${Math.max(9,12*scale)}px Nunito,sans-serif`;
      c.textAlign='center';c.textBaseline='middle';
      c.fillText('🛸',sx,sy-2*scale);c.textBaseline='alphabetic';
    } else if(coin.type==='diamond'){
      // Faceted gem — cyan, sparkly, slightly larger than coin
      const dr=coin.r*scale*1.7;
      c.save();c.translate(sx,sy);
      const dg=c.createLinearGradient(0,-dr,0,dr);
      dg.addColorStop(0,'#E0F7FA');dg.addColorStop(.5,'#4DD0E1');dg.addColorStop(1,'#00838F');
      c.beginPath();
      c.moveTo(0,-dr);c.lineTo(dr*.75,-dr*.15);c.lineTo(dr*.45,dr*.85);
      c.lineTo(-dr*.45,dr*.85);c.lineTo(-dr*.75,-dr*.15);c.closePath();
      c.fillStyle=dg;c.fill();
      c.strokeStyle='#006064';c.lineWidth=1.2*scale;c.stroke();
      // Facet lines
      c.strokeStyle='rgba(255,255,255,.55)';c.lineWidth=.8*scale;
      c.beginPath();c.moveTo(0,-dr);c.lineTo(0,dr*.85);c.stroke();
      c.beginPath();c.moveTo(-dr*.75,-dr*.15);c.lineTo(dr*.75,-dr*.15);c.stroke();
      // Sparkle
      const spF=Math.sin(frameN*.15+coin.bouncePh)*.5+.5;
      c.globalAlpha=spF;c.fillStyle='#fff';
      c.beginPath();c.arc(-dr*.25,-dr*.35,1.8*scale,0,Math.PI*2);c.fill();
      c.globalAlpha=1;
      c.restore();
    } else {
      const cr=coin.r*scale*1.6;
      c.save();c.translate(sx,sy);
      c.beginPath();c.arc(0,0,cr,0,Math.PI*2);
      const cg=c.createRadialGradient(-cr*.3,-cr*.3,1,0,0,cr);
      cg.addColorStop(0,'#FFE57F');cg.addColorStop(1,'#FF8F00');
      c.fillStyle=cg;c.fill();
      c.strokeStyle='#E65100';c.lineWidth=1.2*scale;c.stroke();
      c.fillStyle='#E65100';c.font=`bold ${Math.max(6,9*scale)}px Nunito,sans-serif`;
      c.textAlign='center';c.textBaseline='middle';c.fillText('$',0,0);
      c.restore();
    }
  }

  // Obstacles (sorted by z desc — draw far first)
  const sortedObs=[...obstacles].sort((a,b)=>b.z-a.z);
  for(const o of sortedObs){
    const lx=LANES[o.lane];
    const worldY=o.aerial?185:0;
    const {sx,sy,scale}=proj(lx,o.z,worldY);
    if(scale<0.08||scale>0.98)continue;
    drawObs3D(c,sx,sy,scale,o);
  }

  // Particles
  for(const p of particles){
    c.globalAlpha=p.life/p.ml;
    c.fillStyle=p.col;c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fill();
  }
  c.globalAlpha=1;

  // Player
  if(!P.dead){
    if(P.blink===0||Math.floor(P.blink/5)%2===0){
      const py2=P.y-(P.sliding?12:0);
      const scl=P.sliding?0.92:1;
      if(lvlIdx>=1)
        drawLevelCostume(c,P.x,py2,scl,P.sqX,P.sqY,P.animF,P.sliding,P.shieldOn,P.moving);
      else
        drawSeed3D(c,P.x,py2,scl,P.sqX,P.sqY,P.animF,curSkin,P.sliding,P.shieldOn,P.moving);
    }
  } else {
    if(lvlIdx>=1) drawLevelCostumeDead(c,P.dx,P.dy,P.dAngle);
    else drawSeedDead(c,P.dx,P.dy,P.dAngle,curSkin);
  }

  // Slide indicator
  if(P.sliding){
    c.globalAlpha=.75;c.fillStyle='#FFD740';
    c.font='800 14px Nunito,sans-serif';c.textAlign='center';
    c.fillText('SLIDE! 🏂',P.x,P.y-52);
    c.globalAlpha=1;
  }

  // Victory Lap banner
  if(victoryActive){
    const vRatio=victoryTimer/(12*60);
    const bannerX=VW*(1.1-vRatio*2.2); // scrolls left to right
    c.save();
    c.fillStyle='rgba(0,0,0,.0)'; // transparent bg
    c.font='900 32px Nunito,sans-serif';c.textAlign='left';c.textBaseline='middle';
    c.shadowColor='rgba(0,0,0,.5)';c.shadowBlur=12;
    c.fillStyle='#FFD740';c.fillText('🏆 CHAMPION! 🏆',bannerX,VH/2-80);
    c.font='700 16px Nunito,sans-serif';c.fillStyle='#fff';
    c.fillText('Enjoy your Victory Lap!',bannerX+10,VH/2-48);
    c.shadowBlur=0;c.restore();
    // Confetti rain
    const confCols=['#FFD740','#FF4081','#7C4DFF','#00BCD4','#F8BBD0','#69D36B'];
    for(let ci=0;ci<22;ci++){
      const cx2=((ci*97+frameN*2.2+ci*31)%VW+VW)%VW;
      const cy2=((ci*61+frameN*(1.2+ci*.04))%(VH+100)+VH+100)%(VH+100)-50;
      c.save();c.translate(cx2,cy2);c.rotate(ci*.7+frameN*.05);
      c.fillStyle=confCols[ci%confCols.length];c.globalAlpha=.82;
      c.fillRect(-4,-6,8,12);c.restore();
      c.globalAlpha=1;
    }
  }

  // HUD
  drawHUD(c,lvl);

  // Lane indicator dots
  drawLaneDots(c);

  // Level flash
  if(flashTimer>0){
    const isVictory=flashName.includes('CHAMPION');
    const fp=flashTimer/(isVictory?170:130);
    c.globalAlpha=fp*.5;c.fillStyle=isVictory?'rgba(255,215,64,.35)':'rgba(255,255,180,.3)';c.fillRect(0,0,VW,VH);c.globalAlpha=1;
    c.save();c.textAlign='center';
    const sc2=1+(1-fp)*.5;c.translate(VW/2,VH/2-60);c.scale(sc2,sc2);
    c.globalAlpha=Math.min(1,fp*1.5);
    c.font='900 40px Nunito,sans-serif';c.fillStyle='#fff';
    c.shadowColor='rgba(0,0,0,.5)';c.shadowBlur=18;
    c.fillText(isVictory?'YOU MADE IT!':'LEVEL UP! ✨',0,0);
    c.shadowBlur=0;c.font='800 25px Nunito,sans-serif';
    c.fillStyle=isVictory?'#FFD740':LEVELS[Math.min(lvlIdx,LASTLVL)].color;
    c.fillText(flashName,0,44);
    c.restore();c.globalAlpha=1;
  }
}

// ── Road Drawing ──────────────────────────────────────
function drawRoad(c,sz){
  const horizon=140;
  const roadW_near=360,roadW_far=90;
  const roadL=VW/2;

  // Ground sides
  c.fillStyle='#5DBB5D';
  c.beginPath();
  c.moveTo(0,horizon);c.lineTo(roadL-roadW_far/2,horizon);
  c.lineTo(roadL-roadW_near/2,VH);c.lineTo(0,VH);c.closePath();c.fill();
  c.beginPath();
  c.moveTo(VW,horizon);c.lineTo(roadL+roadW_far/2,horizon);
  c.lineTo(roadL+roadW_near/2,VH);c.lineTo(VW,VH);c.closePath();c.fill();

  // Road body
  c.fillStyle='#546E7A';
  c.beginPath();
  c.moveTo(roadL-roadW_far/2,horizon);
  c.lineTo(roadL+roadW_far/2,horizon);
  c.lineTo(roadL+roadW_near/2,VH);
  c.lineTo(roadL-roadW_near/2,VH);c.closePath();c.fill();

  // Road edge lines
  c.strokeStyle='#FFFFFF';c.lineWidth=2.5;c.globalAlpha=.35;
  c.beginPath();c.moveTo(roadL-roadW_far/2,horizon);c.lineTo(roadL-roadW_near/2,VH);c.stroke();
  c.beginPath();c.moveTo(roadL+roadW_far/2,horizon);c.lineTo(roadL+roadW_near/2,VH);c.stroke();
  c.globalAlpha=1;

  // Lane dividers (dashed perspective)
  c.strokeStyle='rgba(255,255,255,0.55)';c.lineWidth=2;
  for(let li=0;li<2;li++){
    const lf=(li+1)/3;
    const x1f=roadL+(-roadW_far/2+roadW_far*lf);
    const x1n=roadL+(-roadW_near/2+roadW_near*lf);
    // Dashed
    const steps=10;
    for(let s=0;s<steps;s+=2){
      const t0=s/steps,t1=(s+.85)/steps;
      const ax=x1f+(x1n-x1f)*t0, ay=horizon+(VH-horizon)*t0;
      const bx=x1f+(x1n-x1f)*t1, by=horizon+(VH-horizon)*t1;
      // Offset by scroll
      const offT=((sz*0.007)%(.2))/.2;
      const atx=x1f+(x1n-x1f)*((t0+offT)%1), aty=horizon+(VH-horizon)*((t0+offT)%1);
      const btx=x1f+(x1n-x1f)*((t1+offT)%1), bty=horizon+(VH-horizon)*((t1+offT)%1);
      c.beginPath();c.moveTo(atx,aty);c.lineTo(btx,bty);c.stroke();
    }
  }

  // Ground plane below road
  c.fillStyle='#4CAF50';c.fillRect(0,VH-60,VW,60);
  c.fillStyle='#5DBB5D';c.fillRect(0,VH-60,VW,12);
}

// ── Obstacle 3D ───────────────────────────────────────
function drawObs3D(c,sx,sy,scale,o){
  c.save();
  const w=o.w*scale*1.4;
  const h=o.h*scale*1.4;
  const x=sx-w/2, y=sy-h;

  if(o.type==='rock'){
    const g=c.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,'#90A4AE');g.addColorStop(1,'#455A64');
    rrect(c,x,y,w,h,6*scale,g);
    c.strokeStyle='#37474F';c.lineWidth=1.5*scale;
    rrect(c,x,y,w,h,6*scale,null,'#37474F');
    c.fillStyle='rgba(255,255,255,.2)';
    c.beginPath();c.ellipse(sx-w*.15,y+h*.2,w*.22*scale,h*.12*scale,-.3,0,Math.PI*2);c.fill();
    // Shadow
    c.globalAlpha=.2;c.fillStyle='#000';
    c.beginPath();c.ellipse(sx,sy+4*scale,w*.52,6*scale,0,0,Math.PI*2);c.fill();
    c.globalAlpha=1;
  }
  else if(o.type==='thorn'){
    const cols=['#2E7D32','#388E3C','#1B5E20'];
    for(let i=0;i<3;i++){
      const tx=x+i*(w/3);
      const th2=h*(0.7+Math.sin(i*.9)*.25);
      c.fillStyle=cols[i%3];
      c.beginPath();c.moveTo(tx,y+h);c.lineTo(tx+w/6,y+h-th2);c.lineTo(tx+w/3,y+h);c.closePath();c.fill();
    }
    // Berries
    c.fillStyle='#EF5350';
    [[sx-w*.2,y+h*.35],[sx,y+h*.2],[sx+w*.22,y+h*.3]].forEach(([bx2,by2])=>{
      c.beginPath();c.arc(bx2,by2,3.5*scale,0,Math.PI*2);c.fill();
    });
  }
  else if(o.type==='bug'){
    const wx=sx,wy=sy-h/2;
    const flap=Math.sin(frameN*.3+o.flyOff)*8*scale;
    c.globalAlpha=.65;c.fillStyle='#E1BEE7';
    c.beginPath();c.ellipse(wx-w*.4,wy+flap,w*.38,h*.28,-.3,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(wx+w*.4,wy+flap,w*.38,h*.28,.3,0,Math.PI*2);c.fill();
    c.globalAlpha=1;
    const bg=c.createRadialGradient(wx-w*.1,wy-h*.1,1,wx,wy,w*.35);
    bg.addColorStop(0,'#F48FB1');bg.addColorStop(1,'#E91E63');
    c.fillStyle=bg;c.beginPath();c.ellipse(wx,wy,w*.32,h*.38,0,0,Math.PI*2);c.fill();
    c.fillStyle='white';
    c.beginPath();c.arc(wx-w*.12,wy-h*.08,4*scale,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(wx+w*.12,wy-h*.08,4*scale,0,Math.PI*2);c.fill();
    c.fillStyle='#111';
    c.beginPath();c.arc(wx-w*.1,wy-h*.08,2.2*scale,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(wx+w*.14,wy-h*.08,2.2*scale,0,Math.PI*2);c.fill();
  }
  else if(o.type==='tall'){
    // Tall wall — must slide under
    const wg=c.createLinearGradient(x,y,x,y+h);
    wg.addColorStop(0,'#FF7043');wg.addColorStop(1,'#BF360C');
    rrect(c,x,y,w,h,5*scale,wg);
    c.strokeStyle='#E64A19';c.lineWidth=1.5*scale;
    rrect(c,x,y,w,h,5*scale,null,'#E64A19');
    // Warning stripes
    c.globalAlpha=.2;c.fillStyle='#FFD740';
    for(let i=0;i<4;i++)c.fillRect(x+2*scale,y+4*scale+i*h/4.5,w-4*scale,h/6);
    c.globalAlpha=1;
    c.fillStyle='rgba(255,255,255,.9)';c.font=`bold ${Math.max(8,11*scale)}px Nunito,sans-serif`;
    c.textAlign='center';c.fillText('DUCK!',sx,y-5*scale);
  }
  else if(o.type==='low'){
    const g2=c.createLinearGradient(x,y,x,y+h);
    g2.addColorStop(0,'#FFA726');g2.addColorStop(1,'#E65100');
    rrect(c,x,y,w,h,8*scale,g2);
    c.fillStyle='rgba(255,255,255,.9)';c.font=`bold ${Math.max(7,10*scale)}px Nunito,sans-serif`;
    c.textAlign='center';c.fillText('JUMP!',sx,y-5*scale);
  }
  else if(o.type==='pothole'){
    // Rectangular pit — brown earth walls, murky water inside
    const pw=w*1.05, ph=h*1.1;
    const px2=sx-pw/2, py2=sy-ph*.75;
    // Earth border
    c.fillStyle='#5D4037';
    rrect(c,px2-3*scale,py2-3*scale,pw+6*scale,ph+3*scale,4*scale,'#5D4037');
    // Murky water fill
    const wg=c.createLinearGradient(px2,py2,px2,py2+ph);
    wg.addColorStop(0,'#78909C');wg.addColorStop(.4,'#546E7A');wg.addColorStop(1,'#37474F');
    rrect(c,px2,py2,pw,ph,3*scale,wg);
    // Mud rim top
    c.fillStyle='#4E342E';
    c.fillRect(px2,py2-2*scale,pw,4*scale);
    // Ripple lines
    c.strokeStyle='rgba(176,190,197,0.4)';c.lineWidth=1.2*scale;
    for(let ri=0;ri<2;ri++){
      c.beginPath();c.ellipse(sx,py2+ph*.3+ri*ph*.28,pw*.32,ph*.1,0,0,Math.PI*2);c.stroke();
    }
    c.fillStyle='rgba(255,255,255,.85)';c.font=`bold ${Math.max(7,10*scale)}px Nunito,sans-serif`;
    c.textAlign='center';c.fillText('JUMP!',sx,py2-7*scale);
  }
  else if(o.type==='dove'){
    // White pigeon — reward, friendly
    const bx=sx,by2=sy-h*.5;
    const flap=Math.sin(frameN*.22+o.flyOff)*11*scale;
    // Wings (white with grey tips)
    c.globalAlpha=.92;
    c.fillStyle='#F5F5F5';
    c.beginPath();c.moveTo(bx,by2);c.quadraticCurveTo(bx-w*.52,by2-flap,bx-w*.72,by2+flap*.25);c.lineTo(bx-w*.08,by2);c.closePath();c.fill();
    c.beginPath();c.moveTo(bx,by2);c.quadraticCurveTo(bx+w*.52,by2-flap,bx+w*.72,by2+flap*.25);c.lineTo(bx+w*.08,by2);c.closePath();c.fill();
    // Grey wing tips
    c.fillStyle='#CFD8DC';
    c.beginPath();c.moveTo(bx-w*.52,by2-flap*.6);c.lineTo(bx-w*.72,by2+flap*.25);c.lineTo(bx-w*.42,by2-flap*.3);c.closePath();c.fill();
    c.beginPath();c.moveTo(bx+w*.52,by2-flap*.6);c.lineTo(bx+w*.72,by2+flap*.25);c.lineTo(bx+w*.42,by2-flap*.3);c.closePath();c.fill();
    // Body
    const bg2=c.createRadialGradient(bx-w*.05,by2-h*.1,1,bx,by2,w*.22);
    bg2.addColorStop(0,'#FFFFFF');bg2.addColorStop(1,'#ECEFF1');
    c.fillStyle=bg2;c.beginPath();c.ellipse(bx,by2,w*.18,h*.36,0,0,Math.PI*2);c.fill();
    // Breast pink tint
    c.fillStyle='rgba(248,187,208,.5)';c.beginPath();c.ellipse(bx,by2+h*.1,w*.1,h*.18,0,0,Math.PI*2);c.fill();
    // Beak (orange)
    c.fillStyle='#FF8F00';c.beginPath();c.moveTo(bx+w*.15,by2-h*.05);c.lineTo(bx+w*.28,by2-h*.02);c.lineTo(bx+w*.15,by2+h*.04);c.closePath();c.fill();
    // Eye
    c.fillStyle='#212121';c.beginPath();c.arc(bx+w*.08,by2-h*.1,2.2*scale,0,Math.PI*2);c.fill();
    c.fillStyle='#fff';c.beginPath();c.arc(bx+w*.1,by2-h*.12,1*scale,0,Math.PI*2);c.fill();
    c.globalAlpha=1;
  }
  else if(o.type==='bee'){
    // Aerial bee — dodge by changing lane
    const bx=sx,by2=sy-h*.5;
    const flap=Math.sin(frameN*.4+o.flyOff)*9*scale;
    // Wings
    c.globalAlpha=.55;c.fillStyle='#E3F2FD';
    c.beginPath();c.ellipse(bx-w*.38,by2+flap,w*.3,h*.22,-.4,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(bx+w*.38,by2+flap,w*.3,h*.22,.4,0,Math.PI*2);c.fill();
    c.globalAlpha=1;
    // Body stripes
    const stripes=['#FDD835','#212121','#FDD835','#212121'];
    for(let i=0;i<4;i++){
      c.fillStyle=stripes[i];
      c.beginPath();c.ellipse(bx,by2+(-1.5+i)*h*.18,w*.22,h*.12,0,0,Math.PI*2);c.fill();
    }
    // Stinger
    c.fillStyle='#F57F17';c.beginPath();c.moveTo(bx,by2+h*.38);c.lineTo(bx-3*scale,by2+h*.55);c.lineTo(bx+3*scale,by2+h*.55);c.closePath();c.fill();
    // Eyes
    c.fillStyle='#fff';c.beginPath();c.arc(bx-w*.08,by2-h*.25,3*scale,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(bx+w*.08,by2-h*.25,3*scale,0,Math.PI*2);c.fill();
    c.fillStyle='#111';c.beginPath();c.arc(bx-w*.07,by2-h*.25,1.8*scale,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(bx+w*.09,by2-h*.25,1.8*scale,0,Math.PI*2);c.fill();
  }
  else if(o.type==='butterfly'){
    // Butterfly — colourful, aerial obstacle
    const bx=sx,by2=sy-h*.5;
    const flap=Math.sin(frameN*.18+o.flyOff);
    const flapA=flap*0.6; // wing angle
    const wcols=[['#E91E63','#AD1457'],['#9C27B0','#6A1B9A'],['#FF9800','#E65100'],['#00BCD4','#006064']];
    const wc=wcols[Math.floor(o.flyOff*2)%wcols.length];
    c.globalAlpha=.9;
    // Upper wings
    c.save();c.translate(bx,by2);c.rotate(-flapA);
    c.fillStyle=wc[0];c.beginPath();c.ellipse(-w*.28,-h*.15,w*.3,h*.25,-.4,0,Math.PI*2);c.fill();
    // Lower wings
    c.fillStyle=wc[1];c.beginPath();c.ellipse(-w*.22,h*.1,w*.22,h*.18,-.8,0,Math.PI*2);c.fill();
    c.restore();
    c.save();c.translate(bx,by2);c.rotate(flapA);
    c.fillStyle=wc[0];c.beginPath();c.ellipse(w*.28,-h*.15,w*.3,h*.25,.4,0,Math.PI*2);c.fill();
    c.fillStyle=wc[1];c.beginPath();c.ellipse(w*.22,h*.1,w*.22,h*.18,.8,0,Math.PI*2);c.fill();
    c.restore();
    // Wing spots
    c.fillStyle='rgba(255,255,255,0.5)';
    c.beginPath();c.arc(bx-w*.22,by2-h*.1,h*.07,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(bx+w*.22,by2-h*.1,h*.07,0,Math.PI*2);c.fill();
    // Body
    c.fillStyle='#212121';c.beginPath();c.ellipse(bx,by2,h*.06,h*.32,0,0,Math.PI*2);c.fill();
    // Antennae
    c.strokeStyle='#212121';c.lineWidth=1.2*scale;
    c.beginPath();c.moveTo(bx,by2-h*.28);c.lineTo(bx-w*.12,by2-h*.5);c.stroke();
    c.beginPath();c.moveTo(bx,by2-h*.28);c.lineTo(bx+w*.12,by2-h*.5);c.stroke();
    c.fillStyle='#FF9800';
    c.beginPath();c.arc(bx-w*.12,by2-h*.5,2.5*scale,0,Math.PI*2);c.fill();
    c.beginPath();c.arc(bx+w*.12,by2-h*.5,2.5*scale,0,Math.PI*2);c.fill();
    c.globalAlpha=1;
  }
  c.restore();
}

// ── Level Costumes ────────────────────────────────────
function drawLevelCostume(c,x,y,sc,sqX,sqY,af,sliding,shield,moving){
  c.save();c.translate(x,y);
  const bob=Math.sin(af*.18)*3;
  const lean=moving?(.08*(P.targetX>P.x?1:-1)):0;
  c.rotate(lean);
  if(sliding)c.scale(1.35*sc,0.62*sc);
  else c.scale(sqX*sc,sqY*sc);

  switch(Math.min(lvlIdx,LASTLVL)){
    case 1:{ // ROBOT — metallic grey, blue visor
      // Body
      const rb=c.createLinearGradient(-18,-30,18,20);
      rb.addColorStop(0,'#CFD8DC');rb.addColorStop(1,'#607D8B');
      rrect(c,-18,-30+bob,36,50,7,rb);
      // Chest panel
      rrect(c,-11,-20+bob,22,18,4,'#455A64');
      c.fillStyle='#29B6F6';c.fillRect(-8,-17+bob,6,4);
      c.fillStyle='#EF5350';c.fillRect(2,-17+bob,6,4);
      c.fillStyle='#66BB6A';c.fillRect(-3,-10+bob,6,4);
      // Head
      rrect(c,-14,-52+bob,28,24,5,'#B0BEC5');
      // Visor (animated LED)
      const vg=c.createLinearGradient(-10,-46+bob,10,-36+bob);
      vg.addColorStop(0,'#00E5FF');vg.addColorStop(1,'#0288D1');
      rrect(c,-10,-46+bob,20,10,3,vg);
      c.fillStyle='rgba(255,255,255,.4)';c.fillRect(-8,-44+bob,5,3);
      // Antenna
      c.fillStyle='#78909C';c.fillRect(-1.5,-62+bob,3,12);
      c.fillStyle='#29B6F6';c.beginPath();c.arc(0,-63+bob,4,0,Math.PI*2);c.fill();
      if(Math.floor(af*.15)%2===0){c.fillStyle='rgba(41,182,246,.5)';c.beginPath();c.arc(0,-63+bob,7,0,Math.PI*2);c.fill();}
      // Legs
      c.fillStyle='#546E7A';
      if(!sliding){c.fillRect(-14,18+bob,12,14);c.fillRect(2,18+bob,12,14);}
      break;}
    case 2:{ // GENERAL — red/gold armor
      // Cape
      c.fillStyle='#B71C1C';
      c.beginPath();c.moveTo(-5,-30+bob);c.lineTo(-22,25+bob);c.lineTo(5,20+bob);c.closePath();c.fill();
      // Body armor
      const gb=c.createLinearGradient(-16,-28,16,22);
      gb.addColorStop(0,'#EF5350');gb.addColorStop(1,'#B71C1C');
      rrect(c,-16,-28+bob,32,50,6,gb);

  c.fillStyle=s.d;c.fill();c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=2;c.stroke();
  c.strokeStyle='white';c.lineWidth=3;
  [[-9,-2],[5,-2]].forEach(([ox])=>{
    c.beginPath();c.moveTo(ox-4,-9);c.lineTo(ox+4,-1);c.stroke();
    c.beginPath();c.moveTo(ox+4,-9);c.lineTo(ox-4,-1);c.stroke();
  });
  c.beginPath();c.arc(0,8,8,Math.PI+.35,-.35);
  c.strokeStyle='white';c.lineWidth=2.5;c.stroke();
  c.restore();c.globalAlpha=1;
}

function drawSpiritTree(c,x,y,tokens){
  c.strokeStyle='#795548';c.lineWidth=18;c.lineCap='round';
  c.beginPath();c.moveTo(x,y);c.lineTo(x,y-120);c.stroke();
  c.lineWidth=9;c.strokeStyle='#5D4037';
  [[-45,-95],[45,-95],[-22,-128],[22,-128]].forEach(([bx,by])=>{
    c.beginPath();c.moveTo(x,y-80);c.quadraticCurveTo(x+bx*.35,y+by*.4,x+bx,y+by);c.stroke();
  });
  [[x-45,y-103,34],[x+45,y-103,34],[x-22,y-138,30],[x+22,y-138,30],[x,y-154,27]].forEach(([lx,ly,lr])=>{
    const lg=c.createRadialGradient(lx,ly,0,lx,ly,lr);
    lg.addColorStop(0,'#A5D6A7');lg.addColorStop(1,'#388E3C');
    c.globalAlpha=.92;c.fillStyle=lg;c.beginPath();c.arc(lx,ly,lr,0,Math.PI*2);c.fill();
  });
  c.globalAlpha=1;
  if(tokens>=40){
    ['#FF80AB','#FFD740','#FF4081'].forEach((col,i)=>{
      const fx=x+(i-1)*50-15,fy=y-110-i*8;
      c.fillStyle=col;
      for(let p=0;p<5;p++){const a=p*Math.PI*2/5;c.beginPath();c.arc(fx+Math.cos(a)*8,fy+Math.sin(a)*8,5.5,0,Math.PI*2);c.fill();}
      c.fillStyle='#FFF9C4';c.beginPath();c.arc(fx,fy,5,0,Math.PI*2);c.fill();
    });
  }
  c.fillStyle='#D7CCC8';c.beginPath();c.arc(x,y-48,10,0,Math.PI*2);c.fill();
  c.fillStyle='#5D4037';
  c.beginPath();c.arc(x-4,y-50,2.2,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x+4,y-50,2.2,0,Math.PI*2);c.fill();
  c.beginPath();c.arc(x,y-46,5,.2,Math.PI-.2);
  c.strokeStyle='#5D4037';c.lineWidth=1.5;c.stroke();
}

function drawLaneDots(c){
  // Show which lane player is in
  const dotY=GROUND_Y+28;
  for(let i=0;i<3;i++){
    const active=i===P.lane;
    c.globalAlpha=active?1:.35;
    c.fillStyle=active?'#FFD740':'rgba(255,255,255,.7)';
    c.beginPath();c.arc(LANES[i],dotY,active?7:5,0,Math.PI*2);c.fill();
  }
  c.globalAlpha=1;
}

function drawHUD(c,lvl){
  rrect(c,10,10,VW-20,58,14,'rgba(0,0,0,.28)');
  for(let i=0;i<Math.max(lives,3);i++)drawHeart(c,28+i*28,38,11,i<lives?'#EF5350':'rgba(255,255,255,.25)');
  c.textAlign='center';c.font='900 21px Nunito,sans-serif';c.fillStyle='#fff';
  c.fillText(`${Math.floor(elapsed)}s`,VW/2,43);
  c.font='700 11px Nunito,sans-serif';c.fillStyle='rgba(255,255,255,.6)';
  c.fillText('TIME',VW/2,57);
  c.textAlign='right';c.font='800 13px Nunito,sans-serif';c.fillStyle=LEVELS[Math.min(lvlIdx,LASTLVL)].color;
  c.fillText(LEVELS[Math.min(lvlIdx,LASTLVL)].name,VW-18,38);
  c.font='700 11px Nunito,sans-serif';c.fillStyle='rgba(255,255,255,.6)';
  c.fillText(`Lv.${lvlIdx+1} · ⚡${Math.round(curSpd()/BASE_SPD*10)/10}x`,VW-18,55);

  // Second row — UFO flying bar OR victory banner OR coin/diamond/time progress
  if(P.flying){
    const ratio=P.flyTimer/(15*60);
    const bw=VW-20, bh=7;
    rrect(c,10,72,bw,bh,3,'rgba(0,0,0,.3)');
    const fg=c.createLinearGradient(10,0,10+bw*ratio,0);
    fg.addColorStop(0,'#64B5F6');fg.addColorStop(1,'#CE93D8');
    rrect(c,10,72,bw*ratio,bh,3,fg);
    c.textAlign='left';c.font='700 10px Nunito,sans-serif';c.fillStyle='rgba(255,255,255,.7)';
    c.fillText('🛸 Flying',18,97);
  } else if(victoryActive){
    rrect(c,10,76,VW-20,30,10,'rgba(255,193,7,.25)');
    c.textAlign='center';c.font='800 14px Nunito,sans-serif';c.fillStyle='#FFD740';
    c.fillText('🏆 VICTORY LAP — enjoy the ride!',VW/2,97);
  } else {
    const lv=LEVELS[Math.min(lvlIdx,LASTLVL)];
    const timeLeft=Math.max(0,Math.ceil(lv.minT-(elapsed-levelStartT)));
    rrect(c,10,76,VW-20,30,10,'rgba(0,0,0,.2)');
    c.textAlign='left';c.font='800 13px Nunito,sans-serif';
    c.fillStyle=lvlCoin>=lv.coinT?'#A5D6A7':'#FFD740';
    c.fillText(`🪙${lvlCoin}/${lv.coinT}`,18,97);
    c.fillStyle=lvlDiam>=lv.diamT?'#A5D6A7':'#80DEEA';
    c.fillText(`💎${lvlDiam}/${lv.diamT}`,128,97);
    c.fillStyle=timeLeft<=0?'#A5D6A7':'rgba(255,255,255,.75)';
    c.fillText(timeLeft<=0?'✓ Ready!':`⏱${timeLeft}s`,232,97);
    c.textAlign='right';c.font='700 11px Nunito,sans-serif';c.fillStyle='rgba(255,255,255,.5)';
    c.fillText(`🪙Total ${sessionTok}`,VW-18,97);
  }
}

function drawHeart(c,x,y,size,color){
  c.fillStyle=color;c.beginPath();
  c.moveTo(x,y+size*.3);
  c.bezierCurveTo(x,y-size*.2,x-size,y-size*.2,x-size,y+size*.3);
  c.bezierCurveTo(x-size,y+size*.85,x,y+size*1.45,x,y+size*1.45);
  c.bezierCurveTo(x,y+size*1.45,x+size,y+size*.85,x+size,y+size*.3);
  c.bezierCurveTo(x+size,y-size*.2,x,y-size*.2,x,y+size*.3);
  c.fill();
}

function drawBtn(c,x,y,w,h,label,bg,bg2,tc,fs,shadow){
  const g=c.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,bg);g.addColorStop(1,bg2);
  rrect(c,x,y,w,h,h/2,g);
  if(shadow){
    c.globalAlpha=.18;
    const sh=c.createLinearGradient(x,y,x,y+h*.55);
    sh.addColorStop(0,'rgba(255,255,255,.9)');sh.addColorStop(1,'transparent');
    rrect(c,x+2,y+2,w-4,h*.48,h*.48,sh);c.globalAlpha=1;
  }
  c.textAlign='center';c.textBaseline='middle';
  c.font=`800 ${fs}px Nunito,sans-serif`;c.fillStyle=tc;
  c.fillText(label,x+w/2,y+h/2);c.textBaseline='alphabetic';
}

// ── Game Over ─────────────────────────────────────────
function drawGameOver(c){
  c.fillStyle='rgba(5,5,25,.86)';c.fillRect(0,0,VW,VH);
  rrect(c,50,175,VW-100,490,26,'#131535');
  rrect(c,50,175,VW-100,490,26,null,'rgba(255,255,255,.12)');
  if(lvlIdx>=1)drawLevelCostumeDead(c,VW/2,268,Math.PI*.08);
  else drawSeedDead(c,VW/2,268,Math.PI*.08,curSkin);
  c.textAlign='center';
  c.font='900 34px Nunito,sans-serif';c.fillStyle='#fff';c.fillText('Game Over 🌱',VW/2,328);
  c.font='700 15px Nunito,sans-serif';c.fillStyle='rgba(255,255,255,.65)';
  c.fillText(`⏱ ${Math.floor(elapsed)}s  •  ${LEVELS[Math.min(lvlIdx,LASTLVL)].name}`,VW/2,363);
  c.font='800 20px Nunito,sans-serif';c.fillStyle='#FFD740';
  c.fillText(`🪙 +${sessionTok}   💎 +${sessionDiam}`,VW/2,396);
  c.font='700 14px Nunito,sans-serif';c.fillStyle='rgba(255,255,255,.45)';c.fillText(`Best: ${bestScore}s`,VW/2,427);
  if(canRevive){
    c.font='700 13px Nunito,sans-serif';c.fillStyle='rgba(255,255,255,.55)';
    const cap=adCap(lvlIdx);
    c.fillText(cap===Infinity?'Watch an ad to keep going!':`Watch an ad to keep going! (${adsUsed}/${cap} used)`,VW/2,458);
  } else {
    c.font='700 13px Nunito,sans-serif';c.fillStyle='rgba(255,138,128,.85)';
    c.fillText('🚫 No more continues this run!',VW/2,458);
  }
  for(const b of buttons){
    const ip=b.style==='green';
    drawBtn(c,b.x,b.y,b.w,b.h,b.label,ip?'#43A047':'rgba(255,255,255,.15)',ip?'#2E7D32':'rgba(0,0,0,.2)','#fff',ip?18:16,true);
  }
}

// ── Loop ──────────────────────────────────────────────
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);
  lastT=ts;frameN++;
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
